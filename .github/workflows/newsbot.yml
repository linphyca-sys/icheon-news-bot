name: 이천 뉴스봇

on:
  workflow_dispatch:

concurrency:
  group: icheon-newsbot
  cancel-in-progress: false
  queue: max

permissions:
  contents: read

jobs:
  check-news:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: 비공개 전송 기록 체크아웃
        uses: actions/checkout@v4
        with:
          repository: linphyca-sys/newsbot-state
          ref: main
          ssh-key: ${{ secrets.STATE_REPO_SSH_KEY }}
          path: .state

      - name: 전송 기록 복원
        run: |
          cp .state/icheon-news-bot/seen_links.json seen_links.json
          cp .state/icheon-news-bot/articles.csv articles.csv

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 의존성 설치
        run: pip install -q -r requirements.txt

      - name: 뉴스 확인 및 전송
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          INTERVAL_MINUTES: "10"
          MAX_PER_KEYWORD: "0"
          FIRST_RUN_SEND: "0"
          MAX_AGE_HOURS: "6"
          NAVER_MAX_START: "100"
        run: python news_bot.py --once

      - name: 전송 기록 비공개 저장
        working-directory: .state
        run: |
          cp ../seen_links.json icheon-news-bot/seen_links.json
          cp ../articles.csv icheon-news-bot/articles.csv
          git config user.name "news-bot"
          git config user.email "actions@users.noreply.github.com"
          git add icheon-news-bot/seen_links.json icheon-news-bot/articles.csv
          git diff --cached --quiet && exit 0
          git commit -m "기사 전송 기록 갱신"
          for i in 1 2 3 4 5 6 7 8; do
            if git pull --rebase origin main && git push origin main; then exit 0; fi
            git rebase --abort 2>/dev/null || true
            sleep $((i * 3))
          done
          echo "비공개 전송 기록 저장 실패"
          exit 1
